</head>
<body>
  <header>
    <div>
      <a href="/" >Home</a>

  <h2>Datenplaner - entry</h2>

  <div id="name-step" class="controls">
    <label>Name: </label>
    <input id="username" type="text" placeholder="Name eingeben" />
    <label>Jahr: </label>
    <input id="year" type="text" placeholder="2026" value="2026"/>

  <div id="calendar-step" style="display:none;">
    <h3 id="hello"></h3>
    <div id="calendar"></div>
    <div class="controls">
      <button onclick="save()">Speichern</button>
    </div>
  </div>
  <script src="main.js"></script>
